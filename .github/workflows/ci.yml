name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  page-pilot-skill:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/page-pilot-skill
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: plugins/page-pilot-skill/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: CI test suite
        run: npm run test:ci
