<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="description"
      content="Structured scan should prioritize workflow actions over navigation chrome."
    />
    <title>Workflow Priority Page</title>
  </head>
  <body>
    <header>
      <nav aria-label="Site chrome">
        <button id="chrome-action-1" type="button">Overview</button>
        <button id="chrome-action-2" type="button">Products</button>
        <button id="chrome-action-3" type="button">Solutions</button>
        <button id="chrome-action-4" type="button">Pricing</button>
        <button id="chrome-action-5" type="button">Partners</button>
        <button id="chrome-action-6" type="button">Events</button>
        <button id="chrome-action-7" type="button">Community</button>
        <button id="chrome-action-8" type="button">Support</button>
        <button id="chrome-action-9" type="button">Contact sales</button>
        <button id="chrome-action-10" type="button">Language</button>
        <button id="chrome-action-11" type="button">Theme</button>
        <button id="chrome-action-12" type="button">Cookie settings</button>

        <a id="chrome-link-1" href="/overview">Overview hub</a>
        <a id="chrome-link-2" href="/docs">Documentation</a>
        <a id="chrome-link-3" href="/blog">Blog</a>
        <a id="chrome-link-4" href="/events">Events</a>
        <a id="chrome-link-5" href="/support">Support center</a>
        <a id="chrome-link-6" href="/privacy">Privacy</a>
      </nav>
    </header>

    <main id="learn-plan">
      <h1>Azure learning plan</h1>
      <p>Use this page to validate that structured scans keep real workflow actions even when chrome appears first.</p>

      <section aria-label="Plan actions">
        <a id="resume-plan-link" href="/plans/resume">Resume plan</a>
        <button id="start-plan-button" type="button">Start plan</button>
      </section>

      <form id="signup-step-1">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="email@example.com" />

        <label for="first-name">First name</label>
        <input id="first-name" type="text" placeholder="Casey" />

        <button id="acct-confirmation-next" type="button">Next</button>
      </form>
    </main>
  </body>
</html>
